<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инвест Платформа</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #1c1c1e; color: white; text-align: center; padding: 20px; margin: 0; }
        .balance-card { background: #2c2c2e; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .balance { font-size: 32px; font-weight: bold; color: #34c759; margin: 10px 0; }
        .crypto-row { display: flex; justify-content: space-between; background: #2c2c2e; padding: 15px; border-radius: 12px; margin-bottom: 10px; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .crypto-name { font-weight: bold; text-align: left; }
        .crypto-price { color: #34c759; font-weight: bold; }
        .btn { background: #34c759; color: white; border: none; padding: 15px 24px; font-size: 16px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .chart-container { background: #2c2c2e; padding: 15px; border-radius: 15px; margin-top: 15px; }
        svg { width: 100%; height: 100px; }
    </style>
</head>
<body>

    <div class="balance-card">
        <div>Ваш инвестиционный баланс</div>
        <div class="balance" id="user-balance">10 000.00 ₽</div>
        <div style="color: #8e8e93; font-size: 14px;">Статус: Демо-аккаунт активен</div>
    </div>

    <!-- Блок котировок -->
    <div class="crypto-row">
        <div class="crypto-name">Bitcoin (BTC)</div>
        <div class="crypto-price" id="btc-price">Загрузка...</div>
    </div>
    <div class="crypto-row">
        <div class="crypto-name">Ethereum (ETH)</div>
        <div class="crypto-price" id="eth-price">Загрузка...</div>
    </div>

    <button class="btn" onclick="buyCrypto()">Купить активы</button>

    <div class="chart-container">
        <svg viewBox="0 0 500 100" preserveAspectRatio="none">
            <defs>
                <linearGradient id="chart-grad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#34c759" stop-opacity="0.3"/>
                    <stop offset="100%" stop-color="#34c759" stop-opacity="0"/>
                </linearGradient>
            </defs>
            <path d="M 0 100 L 0 80 L 100 70 L 200 75 L 300 50 L 400 30 L 500 10 L 500 100 Z" fill="url(#chart-grad)"></path>
            <path d="M 0 80 L 100 70 L 200 75 L 300 50 L 400 30 L 500 10" fill="none" stroke="#34c759" stroke-width="3" stroke-linecap="round"></path>
        </svg>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Получение реальных курсов криптовалют с биржевого API (Binance)
        async def loadPrices() {
            try {
                // Запрашиваем цены к доллару и переводим условно в рубли (курс ~92)
                const btcRes = await fetch('https://binance.com');
                const btcData = await btcRes.json();
                const btcPrice = (parseFloat(btcData.price) * 92).toLocaleString('ru-RU', { maximumFractionDigits: 0 });
                document.getElementById('btc-price').innerText = btcPrice + ' ₽';

                const ethRes = await fetch('https://binance.com');
                const ethData = await ethRes.json();
                const ethPrice = (parseFloat(ethData.price) * 92).toLocaleString('ru-RU', { maximumFractionDigits: 0 });
                document.getElementById('eth-price').innerText = ethPrice + ' ₽';
            } catch (err) {
                document.getElementById('btc-price').innerText = 'Ошибка API';
                document.getElementById('eth-price').innerText = 'Ошибка API';
            }
        }

        // Запуск обновления цен каждые 5 секунд
        loadPrices();
        setInterval(loadPrices, 5000);

        function buyCrypto() {
            tg.showPopup({
                title: 'Торговые операции',
                message: 'Вы хотите открыть ордер на покупку по текущему рыночному курсу?',
                buttons: [
                    {id: 'buy', type: 'default', text: 'Купить BTC'},
                    {id: 'cancel', type: 'destructive', text: 'Отмена'}
                ]
            }, function(buttonId) {
                if (buttonId === 'buy') {
                    tg.showAlert('Ордер успешно создан! Бэкенд зафиксировал сделку.');
                }
            });
        }
    </script>
</body>
</html>
